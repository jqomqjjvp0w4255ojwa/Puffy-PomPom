<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白糰糰觀察日記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cover">
  <h1>白糰糰觀察日記</h1>
  <p class="cover-date"><span id="cover-date">載入中...</span><span class="cover-weather" id="cover-weather"></span></p>
</div>

<div class="notebook">
  <div class="notebook-header">
    <div class="header-label" onclick="toggleStatusDetail()">
      <span>現在</span>
      <i class="ti ti-chevron-down" id="status-chevron"></i>
    </div>
    <div class="status-detail" id="status-detail">
      <div class="status-line"><span class="status-label">地點</span><span id="location">—</span></div>
      <div class="status-line">
        <span class="status-label">健康</span>
        <div class="bar"><div class="bar-hp" id="bar-hp" style="width:0%"></div></div>
        <span id="val-hp">—</span>
        <span class="status-label">飽食</span>
        <div class="bar"><div class="bar-food" id="bar-food" style="width:0%"></div></div>
        <span id="val-food">—</span>
      </div>
      <div class="status-line" id="fur-line" style="display:none;"><span class="status-label">外觀</span><span id="fur-tag">—</span></div>
    </div>
    <div class="shadow-active" id="shadow-tag"></div>
  </div>
  <div class="pagination">
    <button class="page-btn" id="prev-day-btn" onclick="goPrevDay()" disabled>‹ 前一天</button>
    <span class="page-label" id="page-label">—</span>
    <button class="page-btn" id="next-day-btn" onclick="goNextDay()" disabled>後一天 ›</button>
  </div>
  <div class="entries" id="entries">
    <div class="empty">觀察中...</div>
  </div>
  <div class="rent-overlay" id="rent-overlay" style="display:none;">
    <div class="rent-note">
      <div class="rent-note-title">吉屋出租</div>
      <div class="rent-note-text">房間暫時空著。<br>白糰糰不在，沒有人在觀察。</div>
    </div>
  </div>
</div>

<button class="panel-btn" id="panel-btn" onclick="openPanel()" aria-label="巨怪面板">
  <i class="ti ti-user-circle"></i>
</button>
<button class="panel-btn" id="note-btn" onclick="toggleNote()" aria-label="便利貼">
  <i class="ti ti-note"></i>
</button>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="side-panel" id="side-panel">

  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">
      <i class="ti ti-chevron-right"></i> 收合
    </button>
    <button class="panel-away" id="away-btn" onclick="toggleAway()" title="外出中">
      <i class="ti ti-door-exit"></i>
    </button>
  </div>

  <div class="panel-content">
    <div class="card profile-card">
      <div class="card-row">
        <div class="card-badge profile-avatar"><i class="ti ti-paw"></i></div>
        <div class="card-main">
          <div class="profile-name-row">
            <span class="profile-name">巨怪</span>
            <span class="status-icons" id="status-icons">
              <i class="ti ti-pencil" onclick="editStatus()" title="編輯"></i>
            </span>
          </div>
          <div class="status-display has-dot" id="status-display"></div>
          <textarea class="owner-textarea" id="owner-input" maxlength="30" placeholder="在做什麼、有什麼變化..." style="display:none;"></textarea>
          <div class="edit-actions" id="owner-edit-actions" style="display:none;">
            <span class="edit-cancel" onclick="cancelStatus()">取消</span>
            <button class="owner-submit" id="owner-submit-btn" onclick="submitStatus()">記錄</button>
          </div>
        </div>
      </div>

      <div class="card-divider"></div>

      <div class="card-row">
        <div class="card-badge badge-activity">
          <i class="ti ti-activity"></i>
          <div class="badge-plus" id="compose-trigger" onclick="openCompose()" title="記錄一則動態"><i class="ti ti-plus"></i></div>
        </div>
        <div class="card-main activity-feed" id="activity-feed">
          <div class="empty">還沒有動態。</div>
        </div>
      </div>
      <div class="compose-box" id="compose-box" style="display:none;">
        <textarea class="room-action-textarea" id="room-action-input" maxlength="50" placeholder=""></textarea>
        <div class="compose-actions">
          <span class="edit-cancel" onclick="closeCompose()">取消</span>
          <button class="room-action-submit" onclick="submitRoomAction()">記錄・等待世界回應</button>
        </div>
      </div>
    </div>
    <div class="card-time-tag" id="status-time"></div>

    <div>
      <div class="section-label">房間</div>
      <div class="card">
        <div class="card-row">
          <div class="card-badge badge-env"><i class="ti ti-home"></i></div>
          <div class="card-main">
            <div class="profile-name-row">
              <span class="status-display" id="env-display"></span>
              <span class="status-icons" id="env-icons">
                <i class="ti ti-pencil" onclick="editEnv()" title="編輯"></i>
              </span>
            </div>
            <textarea class="owner-textarea" id="env-input" maxlength="60" placeholder="房間現在的樣子..." style="display:none;"></textarea>
            <div class="profile-meta" id="env-time"></div>
            <div class="edit-actions" id="env-edit-actions" style="display:none;">
              <span class="edit-cancel" onclick="cancelEnv()">取消</span>
              <button class="owner-submit" id="env-submit-btn" onclick="submitEnv()">記錄</button>
            </div>
          </div>
        </div>
        <div class="clean-section">
          <div class="clean-section-label">清潔度</div>
          <div class="clean-bar-wrap">
            <div class="clean-bar-fill" id="clean-bar" style="width:0%"></div>
          </div>
          <div class="clean-desc" id="clean-desc">—</div>
        </div>
      </div>
    </div>

    <div>
      <div class="switch-grid">
        <div class="switch-tile" onclick="toggle('light_on')">
          <div class="switch-icon-label"><i class="ti ti-bulb"></i><span>燈</span></div>
          <div class="switch" id="it-light"><div class="switch-knob"></div></div>
        </div>
        <div class="switch-tile" onclick="toggle('toilet_open')">
          <div class="switch-icon-label"><i class="ti ti-door"></i><span>廁所門</span></div>
          <div class="switch" id="it-toilet"><div class="switch-knob"></div></div>
        </div>
        <div class="switch-tile" onclick="toggle('window_open')">
          <div class="switch-icon-label"><i class="ti ti-window"></i><span>窗戶</span></div>
          <div class="switch" id="it-window"><div class="switch-knob"></div></div>
        </div>
        <div class="switch-tile" onclick="openAcRemote()">
          <div class="switch-icon-label"><i class="ti ti-snowflake"></i><span>冷氣</span></div>
          <div class="switch" id="it-ac"><div class="switch-knob"></div></div>
        </div>
      </div>
    </div>

    <div class="panel-away-overlay" id="panel-away-overlay" style="display:none;">
      <div class="panel-away-text">
        <span>你不在</span>
        <span>最棒的事</span>
        <span>即將發生</span>
        <span>……</span>
      </div>
    </div>
  </div>

</div>

<div class="ac-overlay" id="ac-overlay" onclick="closeAcRemote()"></div>
<div class="ac-remote" id="ac-remote">
  <div class="ac-remote-head">
    <span class="ac-remote-title">冷氣遙控</span>
    <button class="ac-power" id="ac-power" onclick="acTogglePower()" aria-label="電源"><i class="ti ti-power"></i></button>
  </div>
  <div class="ac-readout" id="ac-readout">
    <span class="ac-readout-temp" id="ac-readout-temp">22<small>℃</small></span>
    <span class="ac-readout-mode" id="ac-readout-mode">冷氣</span>
  </div>
  <div class="ac-broken" id="ac-broken" style="display:none;"><i class="ti ti-alert-triangle"></i> 故障中・關機再開機看看</div>
  <div class="ac-body" id="ac-body">
    <div class="ac-section">
      <div class="ac-section-label">模式</div>
      <div class="ac-modes">
        <button class="ac-mode-btn" data-mode="cool" onclick="acSetMode('cool')"><i class="ti ti-snowflake"></i><span>冷氣</span></button>
        <button class="ac-mode-btn" data-mode="heat" onclick="acSetMode('heat')"><i class="ti ti-flame"></i><span>暖氣</span></button>
        <button class="ac-mode-btn" data-mode="fan" onclick="acSetMode('fan')"><i class="ti ti-wind"></i><span>送風</span></button>
        <button class="ac-mode-btn" data-mode="dry" onclick="acSetMode('dry')"><i class="ti ti-droplet"></i><span>除濕</span></button>
      </div>
    </div>
    <div class="ac-section" id="ac-temp-section">
      <div class="ac-section-label">溫度</div>
      <div class="ac-temp-control">
        <button class="ac-temp-btn" onclick="acAdjustTemp(-1)">−</button>
        <span class="ac-temp-val" id="ac-temp-val">22℃</span>
        <button class="ac-temp-btn" onclick="acAdjustTemp(1)">＋</button>
      </div>
    </div>
    <div class="ac-section">
      <div class="ac-section-label">風速</div>
      <div class="ac-fans">
        <button class="ac-fan-btn" data-fan="auto" onclick="acSetFan('auto')">自動</button>
        <button class="ac-fan-btn" data-fan="low" onclick="acSetFan('low')">弱</button>
        <button class="ac-fan-btn" data-fan="mid" onclick="acSetFan('mid')">中</button>
        <button class="ac-fan-btn" data-fan="high" onclick="acSetFan('high')">強</button>
      </div>
    </div>
    <div class="ac-section ac-sleep-row">
      <span class="ac-section-label">舒眠</span>
      <div class="switch" id="ac-sleep-switch" onclick="acToggleSleep()"><div class="switch-knob"></div></div>
    </div>
  </div>
</div>

<div class="note-overlay" id="note-overlay" onclick="closeNote()"></div>
<div class="sticky-note" id="sticky-note" data-color="yellow">
  <div class="sticky-note-menu">
    <i class="ti ti-minus" onclick="closeNote()" title="收合"></i>
    <i class="ti ti-dots" onclick="toggleNoteMenu()"></i>
    <div class="sticky-note-menu-dropdown" id="note-menu-dropdown">
      <div class="note-color-picker">
        <span class="note-color-dot" data-color="yellow" onclick="setNoteColor('yellow')"></span>
        <span class="note-color-dot" data-color="blue" onclick="setNoteColor('blue')"></span>
        <span class="note-color-dot" data-color="green" onclick="setNoteColor('green')"></span>
        <span class="note-color-dot" data-color="pink" onclick="setNoteColor('pink')"></span>
      </div>
    </div>
  </div>
  <textarea class="sticky-note-textarea" id="sticky-note-textarea" maxlength="50" placeholder="想跟他說的話，他聽不懂，但可能會有反應..."></textarea>
  <div class="sticky-note-saved" id="sticky-note-saved" style="display:none;"></div>
  <div class="note-read-mark" id="note-read-mark" style="display:none;">
    <span class="sesame-print"><i></i><i></i><i></i><i></i></span>
    <span class="sesame-print"><i></i><i></i><i></i><i></i></span>
    <span class="sesame-print"><i></i><i></i><i></i><i></i></span>
    <span class="read-label">糰糰看過了</span>
  </div>
  <div class="sticky-note-actions">
    <i class="ti ti-check" id="note-confirm-btn" onclick="confirmNote()"></i>
    <i class="ti ti-trash" id="note-delete-btn" onclick="deleteNote()" style="display:none;"></i>
    <i class="ti ti-pencil" id="note-new-btn" onclick="startNewNote()" title="寫新的" style="display:none;"></i>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
