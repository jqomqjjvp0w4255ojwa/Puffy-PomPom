<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>糰糰暱稱實驗室</title>
<style>
  :root { --bands: 7; }
  body {
    font-family: 'Noto Serif TC', 'PingFang TC', sans-serif;
    background: #f5f0e8;
    color: #4a3a2a;
    margin: 0;
    padding: 20px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #8a7a6a; margin-bottom: 20px; }
  .layout { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  .panel {
    background: #fff;
    border: 1px solid #e8c8b0;
    border-radius: 10px;
    padding: 16px;
  }
  .preview-panel { width: 260px; }
  .preview-name {
    font-size: 28px;
    text-align: center;
    padding: 16px 8px;
    background: #fdf6ee;
    border-radius: 8px;
    border: 1px dashed #e8c8b0;
    margin-bottom: 16px;
    min-height: 1.2em;
  }
  .slider-row { margin-bottom: 16px; }
  .slider-row label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .slider-row input[type=range] { width: 100%; }
  .band-tag { font-size: 11px; color: #b07a4a; }
  .grid-wrap { overflow: auto; max-width: 100%; }
  table.grid { border-collapse: collapse; font-size: 11px; }
  table.grid th, table.grid td {
    border: 1px solid #e8c8b0;
    padding: 0;
    text-align: center;
  }
  table.grid th {
    background: #f0e4d4;
    padding: 4px;
    font-weight: 500;
    white-space: nowrap;
  }
  table.grid th.corner { background: #e8d8c4; }
  table.grid td input {
    width: 78px;
    height: 36px;
    border: none;
    text-align: center;
    font-size: 11px;
    font-family: inherit;
    background: transparent;
    color: #4a3a2a;
  }
  table.grid td input:focus { background: #fff3e0; outline: 1px solid #e8a070; }
  table.grid td.active { background: #ffe8c8; }
  .axis-label {
    font-size: 11px;
    color: #8a7a6a;
    writing-mode: vertical-rl;
    text-align: center;
    padding: 4px;
  }
  .toolbar { margin: 16px 0; display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    font-family: inherit;
    font-size: 12px;
    background: #8a5a3a;
    color: #f5f0e8;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
  }
  button.secondary { background: #c0a888; }
  button:active { opacity: 0.85; }
  input[type=file] { display: none; }
  .hint { font-size: 11px; color: #a08868; margin-top: 8px; line-height: 1.6; }
</style>
</head>
<body>

<h1>糰糰暱稱實驗室</h1>
<div class="sub">熟悉度 × 好感度 7×7 對照表 —— 拖拉桿即時預覽，填完匯出 CSV 交給開發端轉成程式邏輯</div>

<div class="toolbar">
  <button onclick="document.getElementById('file-input').click()">匯入 CSV</button>
  <button onclick="exportCSV()">匯出 CSV</button>
  <button class="secondary" onclick="fillSample()">填入範例暱稱</button>
  <button class="secondary" onclick="clearAll()">清空全部</button>
  <input type="file" id="file-input" accept=".csv" onchange="importCSV(event)">
</div>

<div class="layout">
  <div class="panel preview-panel">
    <div class="preview-name" id="preview-name">—</div>
    <div class="slider-row">
      <label><span>熟悉度</span><span><span id="fam-val">50</span> <span class="band-tag" id="fam-band"></span></span></label>
      <input type="range" id="fam-slider" min="0" max="100" value="50" oninput="updatePreview()">
    </div>
    <div class="slider-row">
      <label><span>好感度</span><span><span id="aff-val">50</span> <span class="band-tag" id="aff-band"></span></span></label>
      <input type="range" id="aff-slider" min="0" max="100" value="50" oninput="updatePreview()">
    </div>
    <div class="hint">拉桿對應的格子會在右側表格高亮，目前命中的暱稱會顯示在上方。</div>
  </div>

  <div class="panel">
    <div class="grid-wrap">
      <table class="grid" id="grid-table"></table>
    </div>
    <div class="hint">橫軸＝好感度區段（左低右高），縱軸＝熟悉度區段（上低下高）。每格直接輸入暱稱，留空表示沿用上一個有填的格子（匯出時仍會照原樣輸出空白）。</div>
  </div>
</div>

<script>
const BANDS = 7;
// 7 段區間，0-100 等分（最後一段含100）
const EDGES = [];
for (let i = 0; i <= BANDS; i++) EDGES.push(Math.round(i * 100 / BANDS));

function bandIndex(value) {
  for (let i = 0; i < BANDS; i++) {
    if (value <= EDGES[i + 1] || i === BANDS - 1) return i;
  }
  return BANDS - 1;
}
function bandLabel(i) {
  return `${EDGES[i]}–${EDGES[i + 1]}`;
}

// grid[famBand][affBand] = nickname
let grid = Array.from({ length: BANDS }, () => Array.from({ length: BANDS }, () => ''));

function buildTable() {
  const table = document.getElementById('grid-table');
  table.innerHTML = '';
  const headRow = document.createElement('tr');
  headRow.innerHTML = `<th class="corner">熟悉度 ＼ 好感度</th>` +
    Array.from({ length: BANDS }, (_, j) => `<th>${bandLabel(j)}</th>`).join('');
  table.appendChild(headRow);

  for (let i = 0; i < BANDS; i++) {
    const row = document.createElement('tr');
    const th = document.createElement('th');
    th.textContent = bandLabel(i);
    row.appendChild(th);
    for (let j = 0; j < BANDS; j++) {
      const td = document.createElement('td');
      td.id = `cell-${i}-${j}`;
      const input = document.createElement('input');
      input.value = grid[i][j];
      input.placeholder = '暱稱';
      input.oninput = () => { grid[i][j] = input.value; updatePreview(); };
      td.appendChild(input);
      row.appendChild(td);
    }
    table.appendChild(row);
  }
}

function updatePreview() {
  const fam = Number(document.getElementById('fam-slider').value);
  const aff = Number(document.getElementById('aff-slider').value);
  document.getElementById('fam-val').textContent = fam;
  document.getElementById('aff-val').textContent = aff;

  const fi = bandIndex(fam);
  const aj = bandIndex(aff);
  document.getElementById('fam-band').textContent = `(${bandLabel(fi)})`;
  document.getElementById('aff-band').textContent = `(${bandLabel(aj)})`;

  document.querySelectorAll('td.active').forEach(td => td.classList.remove('active'));
  const cell = document.getElementById(`cell-${fi}-${aj}`);
  if (cell) cell.classList.add('active');

  const name = grid[fi][aj];
  document.getElementById('preview-name').textContent = name || '（這格還沒填）';
}

function exportCSV() {
  const rows = [];
  rows.push(['熟悉度區段', '好感度區段', '暱稱'].join(','));
  for (let i = 0; i < BANDS; i++) {
    for (let j = 0; j < BANDS; j++) {
      const val = grid[i][j] || '';
      rows.push([`"${bandLabel(i)}"`, `"${bandLabel(j)}"`, `"${val.replace(/"/g, '""')}"`].join(','));
    }
  }
  const csv = rows.join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'nickname-table.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function importCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const text = reader.result.replace(/^﻿/, '');
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    lines.shift(); // header
    lines.forEach(line => {
      const cols = line.match(/"([^"]*)"/g);
      if (!cols || cols.length < 3) return;
      const clean = cols.map(c => c.slice(1, -1).replace(/""/g, '"'));
      const famLabel = clean[0], affLabel = clean[1], name = clean[2];
      for (let i = 0; i < BANDS; i++) if (bandLabel(i) === famLabel)
        for (let j = 0; j < BANDS; j++) if (bandLabel(j) === affLabel)
          grid[i][j] = name;
    });
    buildTable();
    updatePreview();
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAll() {
  if (!confirm('確定清空所有暱稱？')) return;
  grid = Array.from({ length: BANDS }, () => Array.from({ length: BANDS }, () => ''));
  buildTable();
  updatePreview();
}

function fillSample() {
  // 範例：左下（雙低）冷淡稱呼 → 右上（雙高）親密稱呼，純粹示範交錯感，可全部改掉
  const samples = [
    ['巨怪','巨怪','無毛柱','無毛柱','竿子','竿子','裸糰'],
    ['巨怪','無毛柱','無毛柱','竿子','竿子','裸糰','裸糰'],
    ['無毛柱','無毛柱','竿子','竿子','裸糰','裸糰','大毛巢'],
    ['無毛柱','竿子','竿子','裸糰','裸糰','大毛巢','大毛巢'],
    ['竿子','竿子','裸糰','裸糰','大毛巢','大毛巢','暖窩主'],
    ['竿子','裸糰','裸糰','大毛巢','大毛巢','暖窩主','暖窩主'],
    ['裸糰','裸糰','大毛巢','大毛巢','暖窩主','暖窩主','毛家人'],
  ];
  grid = samples;
  buildTable();
  updatePreview();
}

buildTable();
updatePreview();
</script>

</body>
</html>
